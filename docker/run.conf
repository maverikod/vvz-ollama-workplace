# Docker run settings. Source this for consistent container name.
# Author: Vasiliy Zdanovskiy
# email: vasilyvz@gmail.com

CONTAINER_NAME=ollama-adapter
IMAGE_NAME=ollama-adapter
NETWORK_NAME=smart-assistant

# Ollama device: cpu (default), cpu_avx2 (faster CPU), or unset to use GPU/CUDA if available.
# export OLLAMA_LLM_LIBRARY=cpu
# export OLLAMA_LLM_LIBRARY=cpu_avx2

# Test container: same image, code mounted from host (no rebuild for code changes).
CONTAINER_NAME_TEST=ollama-adapter-test
# Host ports for test (adapter 8016, Redis 63791) so test can run alongside prod.
TEST_ADAPTER_HOST_PORT=8016
TEST_REDIS_HOST_PORT=63791
