# Agent Workstation example configuration
# Copy to e.g. mwps.yaml and set values. Environment variables override.
#
# Required:
mcp_proxy_url: "https://mcp-proxy:3004"
mwps_base_url: "http://mwps:11434"
mwps_model: "llama3.1"

# Optional:
# mwps_timeout: 60
# max_tool_rounds: 10
# redis_host: "redis"
# redis_port: 6379

# Optional: proxy auth (if your MCP Proxy requires it)
# proxy_token_header: "X-API-Key"
# proxy_token: "your-token"

# Non-mwps providers (commercial or otherwise) are configured via
# provider_clients in the adapter config (base_url + auth per provider), not
# via flat *_api_key fields here — those are rejected by config validation.

# Optional: commands policy (dynamic commands; step 01)
# allowed_commands: []   # allow-list (used with deny_by_default or as filter with allow_by_default)
# forbidden_commands: [] # always excluded
# commands_policy: allow_by_default  # or deny_by_default

# Optional: paths to files auto-injected into model context when present
# rules_file_path: "config/rules.md"       # rules text → context (session_rules order)
# standards_file_path: "config/standards.md"  # standards text → context
# tools_file_path: "config/tools.json"     # JSON array of MWPS tools → tools in request
